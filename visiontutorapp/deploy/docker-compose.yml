# ─── VisionTutor — Docker Compose ───
# For local development and testing

services:
  # FastAPI backend with Gemini Live API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - PORT=8000
    volumes:
      - ../backend/app:/app/app  # Hot reload in dev
    restart: unless-stopped

  # React frontend served via nginx
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
